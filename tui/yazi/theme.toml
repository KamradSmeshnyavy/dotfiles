[app]
overall = { bg = "Black" }

[mgr]
cwd = { fg = "Cyan" }

find_keyword = { fg = "Yellow", italic = true }
find_position = { fg = "BrightMagenta", bg = "reset", italic = true }

marker_copied = { fg = "Green", bg = "Green" }
marker_cut = { fg = "Red", bg = "Red" }
marker_marked = { fg = "Cyan", bg = "Cyan" }
marker_selected = { fg = "BrightBlue", bg = "BrightBlue" }

count_copied = { fg = "Black", bg = "Green" }
count_cut = { fg = "Black", bg = "Red" }
count_selected = { fg = "Black", bg = "BrightBlue" }

border_symbol = "Ôöé"
