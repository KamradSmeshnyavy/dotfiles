syntect_theme = "~/.config/yazi/Catppuccin-mocha.tmTheme"

[tabs]
active = { fg = "Black", bg = "White", bold = true }
inactive = { fg = "White", bg = "BrightBlack" }

[mode]
normal_main = { fg = "Black", bg = "BrightBlue", bold = true }
normal_alt = { fg = "BrightBlue", bg = "Black" }

select_main = { fg = "Black", bg = "Green", bold = true }
select_alt = { fg = "Green", bg = "Black" }

unset_main = { fg = "Black", bg = "BrightWhite", bold = true }
unset_alt = { fg = "BrightWhite", bg = "Black" }

[indicator]
parent = { fg = "Black", bg = "White" }
current = { fg = "Black", bg = "BrightBlue" }
preview = { fg = "Black", bg = "White" }

[status]
sep_left = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

progress_label = { fg = "White", bold = true }
progress_normal = { fg = "Green", bg = "BrightBlack" }
progress_error = { fg = "Yellow", bg = "Red" }

perm_type = { fg = "Blue" }
perm_read = { fg = "Yellow" }
perm_write = { fg = "Red" }
perm_exec = { fg = "Green" }
perm_sep = { fg = "BrightBlack" }

[input]
border = { fg = "BrightBlue" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "BrightBlue" }
active = { fg = "BrightMagenta" }
inactive = {}

[confirm]
border = { fg = "BrightBlue" }
title = { fg = "BrightBlue" }
body = {}
list = {}
btn_yes = { reversed = true }
btn_no = {}

[cmp]
border = { fg = "BrightBlue" }

[tasks]
border = { fg = "BrightBlue" }
title = {}
hovered = { fg = "BrightMagenta", bold = true }

[which]
mask = { bg = "Black" }
cand = { fg = "Cyan" }
rest = { fg = "BrightBlack" }
desc = { fg = "BrightMagenta" }
separator = " ¯¬£ "
separator_style = { fg = "Black" }

[help]
on = { fg = "Cyan" }
run = { fg = "BrightMagenta" }
desc = { fg = "BrightBlack" }
hovered = { bg = "BrightBlack", bold = true }
footer = { fg = "White", bg = "BrightBlack" }

[notify]
title_info = { fg = "Cyan" }
title_warn = { fg = "Yellow" }
title_error = { fg = "Red" }

[filetype]
rules = [
  # Media
  { mime = "image/*", fg = "Cyan" },
  { mime = "{audio,video}/*", fg = "Yellow" },

  # Archives
  { mime = "application/*zip", fg = "BrightMagenta" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "BrightMagenta" },

  # Documents
  { mime = "application/{pdf,doc,rtf}", fg = "Green" },

  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "BrightBlack" },

  # Special file
  { url = "*", is = "orphan", bg = "Red" },
  { url = "*", is = "exec", fg = "Green" },

  # Dummy file
  { url = "*", is = "dummy", bg = "Red" },
  { url = "*/", is = "dummy", bg = "Red" },

  # Fallback
  { url = "*/", fg = "BrightBlue" },
]

[spot]
border = { fg = "BrightBlue" }
title = { fg = "BrightBlue" }
tbl_cell = { fg = "BrightBlue", reversed = true }
tbl_col = { bold = true }

