# # See https://wiki.hypr.land/Configuring/Basics/Monitors/
# # List current monitors and resolutions possible: hyprctl monitors
# # Format: monitor = [port], resolution, position, scale
#
# # Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
# # env = GDK_SCALE,2
# # monitor=,preferred,auto,auto
#
# # мои настройки монитора
# # Разрешение 2880x1800, частота 120Hz, позиция 0x0, масштаб 1.5
# monitor = eDP-1, 2880x1800@120, 0x0, 2
# # Масштабирование интерфейса приложений
# # --- ГЛОБАЛЬНОЕ МАСШТАБИРОВАНИЕ ИНТЕРФЕЙСОВ ---
# # Настройки для приложений Qt (включая Amnezia, VLC, VirtualBox, Dolphin и др.)
# env = QT_ENABLE_HIGHDPI_SCALING,1
# env = QT_SCALE_FACTOR,1.5
# env = QT_SCALE_FACTOR_ROUNDING_POLICY,PassThrough
#
# # Настройки для приложений GTK (GIMP, Inkscape и старый софт)
# env = GDK_SCALE,1.5
#
# # Корректировка размера шрифтов (144 DPI идеально соответствует 1.5x масштабу)
# env = XFT_DPI,144
#
# # Заставляем приложения использовать Wayland нативно, если они это умеют
# env = QT_QPA_PLATFORM,wayland;xcb
# env = ELECTRON_OZONE_PLATFORM_HINT,auto
# QT_QPA_PLATFORM=xcb 
# QT_SCALE_FACTOR=1.5
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_SCALE_FACTOR QT_QPA_PLATFORM GDK_SCALE
#
#
# # Good compromise for 27" or 32" 4K monitors (but fractional!)
# # env = GDK_SCALE,1.75
# # monitor=,preferred,auto,1.6
#
# # Straight 1x setup for low-resolution displays like 1080p or 1440p
# # Or for ultrawide monitors like 34" 3440x1440 or 49" 5120x1440
# # env = GDK_SCALE,1
# # monitor=,preferred,auto,1
#
# # Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# # monitor = DP-2, preferred, auto, 1, transform, 1
#
# # Example for Framework 13 w/ 6K XDR Apple display
# # monitor = DP-5, 6016x3384@60, auto, 2
# # monitor = eDP-1, 2880x1920@120, auto, 2
#
# # Disable the second ghost monitor on an Apple 6K XDR over Thunderbolt
# # monitor=DP-2,disable


#-- Настройка монитора Lenovo ThinkPad X1 Carbon Gen 13 (OLED 2.8K)
#-- Задаем нативное разрешение, 120Hz и честный масштаб 1.5 (или 1.6 для более крупного текста)
# monitor = eDP-1, 2880x1800@120, 0x0, 2
# bitdepth = 10        -- Включаем 10-битную глубину цвета для сочной OLED-матрицы
# cm = "wide"           -- Активируем расширенный цветовой охват (DCI-P3)
#
# #-- --- ГЛОБАЛЬНОЕ МАСШТАБИРОВАНИЕ ДЛЯ ПРИЛОЖЕНИЙ ---
# #-- Очищаем конфликты: Wayland-приложения должны автоматически подхватывать масштаб 1.5 от Hyprland.
# #-- Переменные нужны только для фикса старого софта и Electron.
#
# #-- Нативная поддержка Wayland (убирает размытие в ONLYOFFICE, Chrome, Discord и т.д.)
# #env = ELECTRON_OZONE_PLATFORM_HINT,wayland
# #env = QT_QPA_PLATFORM,wayland;xcb
# #env = GDK_BACKEND,wayland,x11
#
# #-- Корректировка шрифтов под масштаб 1.5x (144 DPI)
# env = XFT_DPI,144
#
# #-- Экспорт переменных в системный D-Bus, чтобы темы оформления и масштаб не ломались
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XFT_DPI
# xwayland {
#     force_zero_scaling = true
# }
# Настройка OLED-дисплея 2.8K 120Hz с честным масштабом 1.5
monitor = eDP-1, 2880x1800@120, 0x0, 2

# Нативная работа современных приложений в Wayland без размытия (Firefox, Telegram и др.)
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11

# Идеальный размер шрифтов под системный масштаб 1.5 (144 DPI)
env = XFT_DPI,144

# xwayland {
#     force_zero_scaling = true # будет четко, но при этом уменьшаться в размерах(старые приложения), если True
# }

# эти 2 парамета ломают старые приложения(scale) 
env = GDK_SCALE,1.5
env = QT_SCALE_FACTOR,1.5
