# Управление музыкой через Fn-комбинации ThinkPad. FN+P, FN+S, FN+B
bindl = , Pause,   exec, playerctl play-pause #FN+P
bindl = , Scroll_Lock, exec, playerctl next # FN+K
bindl = , Break,       exec, playerctl previous # DOESNT WORK

# Устанавливаем ALT как главный модификатор
$mainMod = SUPER

# --- Базовые действия ---
bind = $mainMod, Q, killactive, # Закрыть окно (как Cmd+Q)
# bind = $mainMod, W, killactive, # Альтернатива (как Cmd+W)
# bind = $mainMod, M, fullscreen, 0 # Полный экран (как Ctrl+Cmd+F)
# bind = $mainMod, F, togglefloating, # Плавающее окно

# =====================================================================
# ИТОГОВЫЙ БЛОК ПОЛЬЗОВАТЕЛЬСКИХ НАСТРОЕК (ПЕРЕЗАПИСЬ БИНДОВ)
# =====================================================================

# # 1. Вызов шпаргалки по биндам (теперь на Super + Shift + K)
# # unbind = SUPER, K
# bindd = SUPER SHIFT, K, Keybindings Cheatsheet, exec, omarchy-menu-keybindings
#
# # 2. Разделение окон Togglesplit (теперь на Super + S)
# # unbind = SUPER, J
# bind = SUPER, M, layoutmsg, togglesplit
#
# # 3. Смена макета Togglelayout (теперь на Super + Alt + L)
# # unbind = SUPER, TAB
# bind = SUPER ALT, L, layoutmsg, togglelayout
#
# 4. ВЕРНУТЬ окно из scratchpad на текущий рабочий стол
# Находясь внутри scratchpad (SUPER+S), выдели окно и нажми эту комбинацию:
bind = SUPER ALT CONTROL, S, movetoworkspace, +0

# # 5. Перемещение фокуса между окнами (Super + HJKL)
# unbind = SUPER, H
# unbind = SUPER, J
# unbind = SUPER, K
# unbind = SUPER, L
#
# bind = SUPER, H, movefocus, l
# bind = SUPER, J, movefocus, d
# bind = SUPER, K, movefocus, u
# bind = SUPER, L, movefocus, r
#
# 6. Режим изменения размера окон (Super + R)
# Вход в режим: Super + R. Управление: HJKL. Выход: Escape или Enter.
bind = SUPER, R, submap, resize

submap = resize

binde = , L, resizeactive, 20 0
binde = , H, resizeactive, -20 0
binde = , K, resizeactive, 0 -20
binde = , J, resizeactive, 0 20

bind = , escape, submap, reset
bind = , return, submap, reset

submap = reset
# =====================================================================

