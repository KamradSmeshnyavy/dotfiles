# Core UI colors
accent = "#36a3d9"                 # Neutral accent (derived from color4 / blue)
cursor = "#e6e1cf"                 # Kitty cursor color
foreground = "#e6e1cf"             # Primary text color
background = "#000000"             # Pure black background

selection_foreground = "#000000"   # Selected text
selection_background = "#e6e1cf"   # Selection background

# --------------------------------------------------
# Base16-aligned 16-color palette
# --------------------------------------------------

# base00–base07 (normal)
color0  = "#000000"  # base00 - Deep background
color1  = "#f07178"  # base08 - Error / critical
color2  = "#b8cc52"  # base0B - Success / positive
color3  = "#e6b673"  # base0A - Warning / attention
color4  = "#36a3d9"  # base0D - Primary accent
color5  = "#ffee99"  # base0E - Secondary accent
color6  = "#36a3d9"  # base0C - Informational
color7  = "#e6e1cf"  # base05 - Default foreground

# base08–base0F (bright)
color8  = "#666666"  # base03 - Dim / inactive
color9  = "#f07178"  # base08 - Bright error
color10 = "#b8cc52"  # base0B - Bright success
color11 = "#e6b673"  # base0A - Bright warning
color12 = "#36a3d9"  # base0D - Bright accent
color13 = "#ffee99"  # base0E - Bright secondary
color14 = "#36a3d9"  # base0C - Bright info
color15 = "#ffffff"  # base07 - High-contrast text
